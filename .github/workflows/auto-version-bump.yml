name: auto-version-bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "desktop/dist/**"
      - ".github/review-learnings.md"
      - "reports/**"
      - "images/**"
      - "output_sessions/**"
  workflow_dispatch:
    inputs:
      releaseType:
        description: "Version increment type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-version-bump-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-bump:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.actor != 'github-actions[bot]' &&
        !startsWith(github.event.head_commit.message, 'chore(version): bump workspace versions to ')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release type
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.releaseType }}" ]; then
            release_type="${{ github.event.inputs.releaseType }}"
          else
            release_type="patch"
          fi
          echo "release_type=$release_type" >> "$GITHUB_OUTPUT"

      - name: Bump workspace versions
        id: bump
        shell: bash
        run: |
          npm version "${{ steps.meta.outputs.release_type }}" --workspaces --include-workspace-root --no-git-tag-version
          npm install --package-lock-only
          new_version="$(node -p "require('./package.json').version")"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Create draft pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/version-bump-v${{ steps.bump.outputs.new_version }}
          delete-branch: true
          draft: true
          commit-message: "chore(version): bump workspace versions to ${{ steps.bump.outputs.new_version }}"
          title: "chore(version): bump workspace versions to ${{ steps.bump.outputs.new_version }}"
          body: |
            ## Summary
            - Auto-detected changes on `main` and prepared a workspace version bump.
            - Release type: `${{ steps.meta.outputs.release_type }}`
            - New version: `${{ steps.bump.outputs.new_version }}`

            ## Updated files
            - `package.json`
            - `client/package.json`
            - `server/package.json`
            - `desktop/package.json`
            - `package-lock.json`

            ## Notes
            - This PR is auto-generated by `.github/workflows/auto-version-bump.yml`.
