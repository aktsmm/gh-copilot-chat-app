name: cli-release-auto-pr

on:
  schedule:
    - cron: "17 */8 * * *"
  workflow_dispatch:
    inputs:
      releaseRepo:
        description: "Release source repo (owner/name)"
        required: false
        default: "github/copilot-cli"
      force:
        description: "Force update even if tag unchanged"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect and apply release updates
        id: apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLI_RELEASE_REPO: ${{ github.event.inputs.releaseRepo || vars.CLI_RELEASE_REPO || 'github/copilot-cli' }}
          CLI_RELEASE_FORCE: ${{ github.event.inputs.force || 'false' }}
        run: node scripts/cli-release-automation.mjs

      - name: Lint
        if: steps.apply.outputs.has_update == 'true' && steps.apply.outputs.files_changed == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.apply.outputs.has_update == 'true' && steps.apply.outputs.files_changed == 'true'
        run: npm run typecheck

      - name: Create draft pull request
        if: steps.apply.outputs.has_update == 'true' && steps.apply.outputs.files_changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync Copilot CLI release ${{ steps.apply.outputs.release_tag }}"
          branch: "automation/cli-release-${{ steps.apply.outputs.release_tag_slug }}"
          title: "chore: sync Copilot CLI release ${{ steps.apply.outputs.release_tag }}"
          draft: true
          delete-branch: true
          body: |
            ## Summary
            - Source release repo: `${{ github.event.inputs.releaseRepo || vars.CLI_RELEASE_REPO || 'github/copilot-cli' }}`
            - Release: `${{ steps.apply.outputs.release_name }}` (`${{ steps.apply.outputs.release_tag }}`)
            - URL: ${{ steps.apply.outputs.release_url }}
            - Detected models: `${{ steps.apply.outputs.models_detected || '(none)' }}`

            ## Validation
            - [x] `npm run lint`
            - [x] `npm run typecheck`

            ## Notes
            This PR was auto-generated by `.github/workflows/cli-release-auto-pr.yml`.
