name: release-desktop-assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Target release tag (for manual run)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.event.inputs.tag }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is required."
          }

          $version = $tag -replace '^v', ''
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Failed to derive version from tag: $tag"
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Validate workspace versions against tag
        shell: pwsh
        run: |
          $expected = "${{ steps.release_tag.outputs.version }}"
          $rootVersion = (Get-Content "package.json" | ConvertFrom-Json).version
          $clientVersion = (Get-Content "client/package.json" | ConvertFrom-Json).version
          $serverVersion = (Get-Content "server/package.json" | ConvertFrom-Json).version
          $desktopVersion = (Get-Content "desktop/package.json" | ConvertFrom-Json).version

          $mismatch = @()
          if ($rootVersion -ne $expected) { $mismatch += "root=$rootVersion" }
          if ($clientVersion -ne $expected) { $mismatch += "client=$clientVersion" }
          if ($serverVersion -ne $expected) { $mismatch += "server=$serverVersion" }
          if ($desktopVersion -ne $expected) { $mismatch += "desktop=$desktopVersion" }

          if ($mismatch.Count -gt 0) {
            throw "Version mismatch. expected=$expected actual=[$($mismatch -join ', ')]"
          }

      - name: Clean desktop dist
        shell: pwsh
        run: |
          if (Test-Path "desktop/dist") {
            Remove-Item "desktop/dist" -Recurse -Force
          }

      - name: Build desktop distributables
        run: npm run build:desktop

      - name: Create ZIP bundles and checksums
        shell: pwsh
        run: |
          $dist = Resolve-Path "desktop/dist"
          $version = "${{ steps.release_tag.outputs.version }}"

          $setupExe = Join-Path $dist ("GitHub Copilot Chat Setup $version.exe")
          $portableDir = Join-Path $dist "win-unpacked"

          if (-not (Test-Path -LiteralPath $setupExe)) {
            $candidates = Get-ChildItem -Path "$dist/GitHub Copilot Chat Setup *.exe" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name
            throw "Setup EXE not found for version '$version'. Found: $($candidates -join ', ')"
          }
          if (-not (Test-Path -LiteralPath $portableDir)) {
            throw "Portable folder not found: $portableDir"
          }

          $setupZip = Join-Path $dist ("GitHub Copilot Chat Setup $version.zip")
          $portableZip = Join-Path $dist ("GitHub Copilot Chat Portable $version.zip")

          if (Test-Path $setupZip) { Remove-Item $setupZip -Force }
          if (Test-Path $portableZip) { Remove-Item $portableZip -Force }

          Compress-Archive -LiteralPath $setupExe -DestinationPath $setupZip -CompressionLevel Optimal
          Compress-Archive -Path (Join-Path $portableDir "*") -DestinationPath $portableZip -CompressionLevel Optimal

          $hashTargets = @(
            $setupZip,
            $portableZip
          )

          $shaPath = Join-Path $dist "SHA256SUMS.txt"
          $lines = foreach ($target in $hashTargets) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash.ToLowerInvariant()
            "$hash *$([System.IO.Path]::GetFileName($target))"
          }
          Set-Content -Path $shaPath -Value $lines -Encoding utf8

      - name: Upload desktop assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            desktop/dist/GitHub Copilot Chat Setup ${{ steps.release_tag.outputs.version }}.zip
            desktop/dist/GitHub Copilot Chat Portable ${{ steps.release_tag.outputs.version }}.zip
            desktop/dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
