name: release-desktop-assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Target release tag (for manual run)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop distributables
        run: npm run build:desktop

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.event.inputs.tag }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is required."
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload desktop assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            desktop/dist/GitHub Copilot Chat Setup *.exe
            desktop/dist/GitHub Copilot Chat Setup *.exe.blockmap
            desktop/dist/GitHub Copilot Chat [0-9]*.exe
          fail_on_unmatched_files: true
